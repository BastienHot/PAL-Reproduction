# Environment for PAL reproduction
# Base: ESConv codes_zcj/env.yml (https://github.com/thu-coai/Emotional-Support-Conversation)
# CHANGE: added pytorch-lightning (required by persona_extractor/train_bart.py)
# CHANGE: replaced Tsinghua mirror channels with conda-forge for non-China users
#         (if you are in China, restore the original Tsinghua mirrors)
name: pal
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.8.5
  - numpy=1.19.2
  - pytorch=1.7.0
  - torchaudio=0.7.0
  - torchvision=0.8.1
  - cudatoolkit=10.1.243
  - six=1.15.0
  - pip
  - pip:
      - gensim==3.8.3
      - nltk==3.5
      - scikit_learn==0.24.1
      - scipy==1.5.4
      - statsmodels==0.12.2
      - tokenizers==0.10.3
      - transformers==4.9.2
      - tqdm==4.54.0
      - pytorch-lightning>=1.5,<1.6
      - pandas
      - psutil
